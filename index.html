<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("fa-portfolio-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
